<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>早買早享受</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;family=Noto+Sans+HK:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;family=Noto+Sans+HK:wght@400;500;700&amp;display=swap');
        
        .tail-container {
            font-family: 'Noto Sans HK', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
        }
        
        .card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        
        .photo-container { aspect-ratio: 1 / 1; overflow: hidden; }
        
        .detail-image-container { position: relative; max-height: 45vh; }
        #detail-img { width: 100%; height: auto; max-height: 45vh; object-fit: contain; border-radius: 1.5rem; }
        
        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 42px; height: 42px;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(8px);
            border: 1px solid #e7e5e4; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            z-index: 20;
        }
        
        .toast {
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
        }
        @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes toastOut { to { transform: translateY(20px); opacity: 0; } }
    </style>
</head>
<body class="tail-container bg-stone-50 text-stone-800 min-h-screen pb-20">
    <!-- Header -->
    <header class="bg-white border-b border-stone-200 sticky top-0 z-50">
        <div class="max-w-xl mx-auto px-4 py-4 flex items-center justify-between">
            <h1 class="text-2xl font-semibold tracking-tight">早買早享受</h1>
            <div class="flex items-center gap-3">
                <select id="sort-select" onchange="changeSortOrder()" class="bg-white border border-stone-200 text-sm rounded-2xl px-4 py-2 focus:outline-none focus:border-[#874FC2]">
                    <option value="date-desc">添加日期 ↓</option>
                    <option value="date-asc">添加日期 ↑</option>
                    <option value="notes-asc">備註筆劃 ↑</option>
                </select>
                <button onclick="showBackupModal()" class="w-9 h-9 flex items-center justify-center text-stone-500 hover:text-stone-700">
                    <i class="fa-solid fa-download text-lg"></i>
                </button>
                <button onclick="document.getElementById('import-input').click()" class="w-9 h-9 flex items-center justify-center text-stone-500 hover:text-stone-700">
                    <i class="fa-solid fa-upload text-lg"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-xl mx-auto px-4 pt-6">
        <div id="tab-all" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-medium flex items-center gap-2">
                    <span>全部記錄</span>
                    <span id="all-count" class="text-xs bg-stone-200 text-stone-600 px-2.5 py-1 rounded-full font-mono">0</span>
                </h2>
                <div onclick="showAddModal()" class="flex items-center gap-2 bg-[#874FC2] hover:brightness-110 text-white text-sm font-medium px-5 py-2.5 rounded-3xl shadow-sm active:scale-95 transition-all cursor-pointer">
                    <i class="fa-solid fa-plus"></i>
                    <span>新增記錄</span>
                </div>
            </div>
            <div id="all-grid" class="grid grid-cols-2 gap-4"></div>
        </div>

        <!-- 其他分頁（paid, shipped, home）省略以節省篇幅，保持不變 -->
        <div id="tab-paid" class="tab-content hidden">...（同之前）</div>
        <div id="tab-shipped" class="tab-content hidden">...（同之前）</div>
        <div id="tab-home" class="tab-content hidden">...（同之前）</div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 z-50">
        <div class="max-w-xl mx-auto">
            <div class="grid grid-cols-4 text-xs">
                <button onclick="switchTab(0)" id="nav-0" class="flex flex-col items-center py-3 text-[#874FC2] border-t-2 border-[#874FC2]">
                    <i class="fa-solid fa-list-ul text-xl mb-1"></i>
                    <span class="font-medium">全部</span>
                </button>
                <button onclick="switchTab(1)" id="nav-1" class="flex flex-col items-center py-3 text-stone-400 hover:text-stone-600">
                    <span class="text-2xl mb-1">💸</span><span class="font-medium">已付</span>
                </button>
                <button onclick="switchTab(2)" id="nav-2" class="flex flex-col items-center py-3 text-stone-400 hover:text-stone-600">
                    <span class="text-2xl mb-1">📮</span><span class="font-medium">到貨</span>
                </button>
                <button onclick="switchTab(3)" id="nav-3" class="flex flex-col items-center py-3 text-stone-400 hover:text-stone-600">
                    <span class="text-2xl mb-1">🏠</span><span class="font-medium">返屋企</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Add/Edit Modal -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/70 flex items-end z-[100]">
        <div class="bg-white w-full max-w-xl mx-auto rounded-t-3xl max-h-[92vh] overflow-hidden flex flex-col">
            <div class="px-6 py-5 border-b flex items-center justify-between">
                <h3 id="modal-title" class="font-semibold text-xl">新增記錄</h3>
                <button onclick="hideAddModal()" class="text-3xl text-stone-400">×</button>
            </div>
            
            <div class="flex-1 overflow-auto p-6 space-y-8">
                <div>
                    <label class="block text-sm font-medium text-stone-500 mb-3">商品照片</label>
                    <div id="photo-upload-area" onclick="document.getElementById('photo-input').click()" 
                         class="border-2 border-dashed border-stone-300 rounded-3xl h-64 flex flex-col items-center justify-center cursor-pointer hover:border-[#874FC2]">
                        <i class="fa-solid fa-camera text-4xl text-stone-300 mb-3"></i>
                        <p class="text-stone-400 text-sm">點擊上傳或拍照</p>
                    </div>
                    <input type="file" id="photo-input" accept="image/*" class="hidden" onchange="handlePhotoSelect(event)">
                    
                    <div id="photo-preview" class="hidden mt-4 relative">
                        <img id="preview-img" class="w-full rounded-3xl shadow-sm" alt="">
                        <button onclick="triggerPhotoReupload()" class="absolute bottom-4 left-4 bg-white shadow text-[#874FC2] w-9 h-9 rounded-2xl flex items-center justify-center">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button onclick="removePhoto()" class="absolute top-4 right-4 bg-white text-red-500 w-8 h-8 rounded-2xl flex items-center justify-center">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-stone-500 mb-2">備註 / 商品名稱</label>
                    <textarea id="notes-input" rows="3" class="w-full border border-stone-200 focus:border-[#874FC2] rounded-3xl px-5 py-4 text-base resize-none" placeholder="例如：無印良品 棉質 T 恤"></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-stone-500 mb-3">目前狀態</label>
                    <div class="grid grid-cols-3 gap-3" id="status-options"></div>
                </div>
            </div>
            
            <div class="p-6 border-t flex gap-4">
                <button onclick="hideAddModal()" class="flex-1 py-4 text-stone-500 font-medium border border-stone-200 rounded-3xl">取消</button>
                <button onclick="saveRecord()" id="save-btn" class="flex-1 py-4 bg-[#874FC2] text-white font-medium rounded-3xl active:scale-95">保存記錄</button>
            </div>
        </div>
    </div>

    <!-- 其他 Modal（Detail & Backup）保持不變，省略以節省長度 -->

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-2xl shadow-xl flex items-center gap-3 z-[200]">
        <i class="fa-solid fa-check-circle"></i>
        <span id="toast-text" class="font-medium"></span>
    </div>

    <script>
        // ...（保留之前的 records, functions 等核心邏輯）

        let records = [];
        let currentEditId = null;
        let currentDetailId = null;
        let currentPhotoBase64 = null;
        let currentTab = 0;
        let currentSortOrder = 'date-desc';
        let detailRecordIds = [];
        let isSaving = false;

        const STATUS_OPTIONS = [ /* 同之前 */ ];

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2500);
        }

        function saveRecord() {
            if (isSaving) return;
            isSaving = true;
            
            const notes = document.getElementById('notes-input').value.trim();
            
            if (!currentPhotoBase64 && !currentEditId) {
                alert('請上傳一張照片！');
                isSaving = false;
                return;
            }
            
            if (currentEditId) {
                const record = records.find(r => r.id === currentEditId);
                if (record) {
                    record.notes = notes || '無備註';
                    if (currentPhotoBase64) record.image = currentPhotoBase64;
                    record.status = currentStatus;
                }
            } else {
                const newRecord = {
                    id: 'rec_' + Date.now().toString(36) + Math.random().toString(36).substr(2),
                    image: currentPhotoBase64,
                    notes: notes || '無備註',
                    status: currentStatus,
                    timestamp: Date.now()
                };
                records.unshift(newRecord);
            }
            
            saveToStorage();
            hideAddModal();
            renderAll();
            
            showToast(currentEditId ? '✅ 記錄已更新' : '✅ 已成功加入記錄');
            isSaving = false;
        }

        // 其他函數保持最新版本（包含圖片 contain、編輯修復等）

        function initializeApp() {
            loadRecords();
            switchTab(0);
            
            const addModal = document.getElementById('add-modal');
            const detailModal = document.getElementById('detail-modal');
            
            addModal.addEventListener('click', e => { if (e.target === addModal) hideAddModal(); });
            detailModal.addEventListener('click', e => { if (e.target === detailModal) hideDetailModal(); });
        }

        window.onload = initializeApp;
    </script>
</body>
</html>
