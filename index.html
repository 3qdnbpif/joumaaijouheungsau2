<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>早買早享受</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans HK', system-ui, sans-serif; }
        .card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .toast { animation: toastIn 0.3s ease, toastOut 0.3s 2.8s forwards; }
        @keyframes toastIn { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes toastOut { to { transform: translateY(20px); opacity: 0; } }
    </style>
</head>
<body class="bg-stone-50 min-h-screen pb-20">

<header class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-xl mx-auto px-4 py-4 flex items-center justify-between">
        <h1 class="text-2xl font-semibold">早買早享受</h1>
        <div class="flex gap-3">
            <select id="sort-select" onchange="changeSortOrder()" class="rounded-2xl border px-4 py-2 text-sm">
                <option value="date-desc">添加日期 ↓</option>
                <option value="date-asc">添加日期 ↑</option>
                <option value="notes-asc">備註筆劃 ↑</option>
            </select>
        </div>
    </div>
</header>

<main class="max-w-xl mx-auto px-4 pt-6">
    <div id="tab-all" class="tab-content">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-medium">全部記錄 <span id="all-count" class="bg-stone-200 px-3 py-1 rounded-full text-xs">0</span></h2>
            <button onclick="showAddModal()" class="bg-[#874FC2] text-white px-5 py-3 rounded-3xl flex items-center gap-2 active:scale-95">
                <i class="fa-solid fa-plus"></i> 新增記錄
            </button>
        </div>
        <div id="all-grid" class="grid grid-cols-2 gap-4"></div>
    </div>

    <!-- 其他分頁 -->
    <div id="tab-paid" class="tab-content hidden">已付款</div>
    <div id="tab-shipped" class="tab-content hidden">已到貨</div>
    <div id="tab-home" class="tab-content hidden">已返屋企</div>
</main>

<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t z-50">
    <div class="max-w-xl mx-auto grid grid-cols-4 text-xs">
        <button onclick="switchTab(0)" id="nav-0" class="py-3 text-[#874FC2] border-t-2 border-[#874FC2]">全部</button>
        <button onclick="switchTab(1)" id="nav-1" class="py-3 text-stone-400">💸 已付</button>
        <button onclick="switchTab(2)" id="nav-2" class="py-3 text-stone-400">📮 到貨</button>
        <button onclick="switchTab(3)" id="nav-3" class="py-3 text-stone-400">🏠 返屋企</button>
    </div>
</nav>

<!-- Add/Edit Modal -->
<div id="add-modal" class="hidden fixed inset-0 bg-black/70 flex items-end z-[100]">
    <div class="bg-white w-full max-w-xl mx-auto rounded-t-3xl max-h-[92vh] overflow-hidden flex flex-col">
        <div class="px-6 py-5 border-b flex justify-between">
            <h3 id="modal-title" class="font-semibold text-xl">新增記錄</h3>
            <button onclick="hideAddModal()" class="text-3xl text-stone-400">×</button>
        </div>
        <div class="flex-1 p-6 overflow-auto space-y-8">
            <div>
                <label class="block text-sm font-medium text-stone-500 mb-3">商品照片</label>
                <div id="photo-upload-area" onclick="document.getElementById('photo-input').click()" 
                     class="border-2 border-dashed border-stone-300 rounded-3xl h-64 flex flex-col items-center justify-center cursor-pointer hover:border-[#874FC2]">
                    <i class="fa-solid fa-camera text-4xl text-stone-300 mb-3"></i>
                    <p class="text-stone-400">點擊上傳或拍照</p>
                </div>
                <input type="file" id="photo-input" accept="image/*" class="hidden" onchange="handlePhotoSelect(event)">
                <div id="photo-preview" class="hidden mt-4 relative">
                    <img id="preview-img" class="w-full rounded-3xl">
                    <button onclick="removePhoto()" class="absolute top-4 right-4 bg-red-500 text-white w-8 h-8 rounded-full">×</button>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-stone-500 mb-2">備註</label>
                <textarea id="notes-input" rows="3" class="w-full border rounded-3xl p-4" placeholder="商品名稱或備註"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-stone-500 mb-3">狀態</label>
                <div id="status-options" class="grid grid-cols-3 gap-3"></div>
            </div>
        </div>
        <div class="p-6 border-t flex gap-3">
            <button onclick="hideAddModal()" class="flex-1 py-4 border rounded-3xl">取消</button>
            <button onclick="saveRecord()" class="flex-1 py-4 bg-[#874FC2] text-white rounded-3xl">保存記錄</button>
        </div>
    </div>
</div>

<!-- Detail Modal -->
<div id="detail-modal" class="hidden fixed inset-0 bg-black/70 flex items-end z-[100]">
    <div class="bg-white w-full max-w-xl mx-auto rounded-t-3xl overflow-hidden">
        <!-- 詳情內容 -->
        <div class="p-6">
            <div class="flex justify-end"><button onclick="hideDetailModal()" class="text-3xl">×</button></div>
            <img id="detail-img" class="w-full rounded-3xl mb-6">
            <div id="detail-notes" class="text-lg mb-4"></div>
            <div id="detail-status"></div>
        </div>
        <div class="border-t p-6 flex gap-3">
            <button onclick="editCurrentRecord()" class="flex-1 py-4 border rounded-3xl">編輯</button>
            <button onclick="deleteCurrentRecord()" class="flex-1 py-4 bg-red-50 text-red-600 rounded-3xl">刪除</button>
        </div>
    </div>
</div>

<!-- Backup Modal -->
<div id="backup-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[200]">
    <div class="bg-white rounded-3xl w-full max-w-sm mx-4">
        <div class="p-8">
            <h3 class="text-2xl font-semibold mb-6">備份與還原</h3>
            <div class="space-y-4">
                <button onclick="exportData()" 
                        class="w-full py-5 border-2 border-stone-300 hover:border-stone-400 rounded-3xl flex items-center justify-center gap-3 text-base">
                    <i class="fa-solid fa-download"></i> 下載備份 JSON
                </button>
                <button onclick="document.getElementById('import-input').click()" 
                        class="w-full py-5 bg-[#874FC2] text-white rounded-3xl flex items-center justify-center gap-3 text-base">
                    <i class="fa-solid fa-upload"></i> 上傳備份 JSON
                </button>
                <input type="file" id="import-input" accept=".json" class="hidden" onchange="importData(event)">
            </div>
        </div>
        <div class="border-t p-6 text-center">
            <button onclick="hideBackupModal()" class="text-stone-400">關閉</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3 z-[300]">
    <i class="fa-solid fa-check-circle"></i>
    <span id="toast-text" class="font-medium"></span>
</div>

<script>
    let records = [];
    let currentEditId = null;
    let currentDetailId = null;
    let currentPhotoBase64 = null;
    let currentTab = 0;
    let currentStatus = 'paid';

    function loadRecords() {
        records = JSON.parse(localStorage.getItem('purchaseRecords') || '[]');
        renderAll();
    }

    function saveToStorage() {
        localStorage.setItem('purchaseRecords', JSON.stringify(records));
    }

    function renderAll() {
        const container = document.getElementById('all-grid');
        container.innerHTML = '';
        records.forEach(r => {
            const div = document.createElement('div');
            div.className = 'bg-white rounded-3xl overflow-hidden shadow-sm cursor-pointer';
            div.innerHTML = `<img src="${r.image}" class="w-full aspect-square object-cover"><div class="p-3"><div class="font-medium">${r.notes}</div></div>`;
            div.onclick = () => showDetail(r.id);
            container.appendChild(div);
        });
        document.getElementById('all-count').textContent = records.length;
    }

    function showAddModal() {
        currentPhotoBase64 = null;
        document.getElementById('notes-input').value = '';
        document.getElementById('photo-preview').classList.add('hidden');
        document.getElementById('photo-upload-area').classList.remove('hidden');
        document.getElementById('add-modal').classList.remove('hidden');
    }

    function hideAddModal() {
        document.getElementById('add-modal').classList.add('hidden');
    }

    function handlePhotoSelect(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            currentPhotoBase64 = ev.target.result;
            document.getElementById('preview-img').src = currentPhotoBase64;
            document.getElementById('photo-preview').classList.remove('hidden');
            document.getElementById('photo-upload-area').classList.add('hidden');
        };
        reader.readAsDataURL(file);
    }

    function removePhoto() {
        currentPhotoBase64 = null;
        document.getElementById('photo-preview').classList.add('hidden');
        document.getElementById('photo-upload-area').classList.remove('hidden');
    }

    function saveRecord() {
        const notes = document.getElementById('notes-input').value.trim();
        if (!currentPhotoBase64) {
            alert("請上傳照片！");
            return;
        }
        const newRecord = {
            id: Date.now().toString(),
            image: currentPhotoBase64,
            notes: notes || "無備註",
            timestamp: Date.now()
        };
        records.unshift(newRecord);
        saveToStorage();
        hideAddModal();
        renderAll();
        showToast("✅ 新增成功！");
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toast-text').textContent = msg;
        t.classList.remove('hidden');
        setTimeout(() => t.classList.add('hidden'), 2800);
    }

    function showDetail(id) {
        const record = records.find(r => r.id === id);
        if (!record) return;
        currentDetailId = id;
        document.getElementById('detail-img').src = record.image;
        document.getElementById('detail-notes').textContent = record.notes;
        document.getElementById('detail-modal').classList.remove('hidden');
    }

    function hideDetailModal() {
        document.getElementById('detail-modal').classList.add('hidden');
    }

    function editCurrentRecord() {
        hideDetailModal();
        // 這裡可以擴展編輯功能
    }

    function deleteCurrentRecord() {
        if (confirm("確定刪除？")) {
            records = records.filter(r => r.id !== currentDetailId);
            saveToStorage();
            hideDetailModal();
            renderAll();
        }
    }

    function changeSortOrder() { renderAll(); }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.getElementById('tab-all').classList.remove('hidden');
    }

    function showBackupModal() {
        document.getElementById('backup-modal').classList.remove('hidden');
    }

    function hideBackupModal() {
        document.getElementById('backup-modal').classList.add('hidden');
    }

    function exportData() {
        if (records.length === 0) return alert("沒有資料可備份");
        const dataStr = JSON.stringify(records, null, 2);
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
        const link = document.createElement('a');
        link.href = dataUri;
        link.download = `備份_${new Date().toISOString().slice(0,10)}.json`;
        link.click();
        hideBackupModal();
        showToast("✅ 備份已下載");
    }

    function importData(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const imported = JSON.parse(ev.target.result);
                if (confirm(`確認匯入 ${imported.length} 筆記錄？現有資料將被替換。`)) {
                    records = imported;
                    saveToStorage();
                    renderAll();
                    hideBackupModal();
                    showToast("✅ 備份已成功匯入！");
                }
            } catch(err) {
                alert("檔案格式錯誤！");
            }
        };
        reader.readAsText(file);
        e.target.value = '';
    }

    window.onload = () => {
        loadRecords();
        switchTab(0);
        console.log("%c✅ App 已載入", "color:#874FC2");
    };
</script>
</body>
</html>
