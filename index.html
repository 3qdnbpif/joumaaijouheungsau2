<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>早買早享受</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;family=Noto+Sans+HK:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;family=Noto+Sans+HK:wght@400;500;700&amp;display=swap');
        
        .tail-container {
            font-family: 'Noto Sans HK', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
        }
        
        .card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }
        
        .photo-container {
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }
        
        .detail-image-container {
            position: relative;
            max-height: 45vh;
        }
        
        #detail-img {
            width: 100%;
            height: auto;
            max-height: 45vh;
            object-fit: contain;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 42px;
            height: 42px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            border: 1px solid #e7e5e4;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: all 0.2s ease;
            z-index: 20;
        }
        
        .nav-arrow:hover {
            background: white;
            transform: translateY(-50%) scale(1.05);
        }
        
        .thumbnail {
            transition: transform 0.3s ease;
        }
        
        .thumbnail:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="tail-container bg-stone-50 text-stone-800 min-h-screen pb-20">
    <!-- Header -->
    <header class="bg-white border-b border-stone-200 sticky top-0 z-50">
        <div class="max-w-xl mx-auto px-4 py-4 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight">早買早享受</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <select id="sort-select" onchange="changeSortOrder()"
                        class="bg-white border border-stone-200 text-sm rounded-2xl px-4 py-2 focus:outline-none focus:border-amber-300">
                    <option value="date-desc">添加日期 ↓</option>
                    <option value="date-asc">添加日期 ↑</option>
                    <option value="notes-asc">備註筆劃 ↑</option>
                </select>
                
                <button onclick="showBackupModal()" 
                        class="w-9 h-9 flex items-center justify-center text-stone-500 hover:text-stone-700 transition-colors">
                    <i class="fa-solid fa-download text-lg"></i>
                </button>
                <button onclick="document.getElementById('import-input').click()" 
                        class="w-9 h-9 flex items-center justify-center text-stone-500 hover:text-stone-700 transition-colors">
                    <i class="fa-solid fa-upload text-lg"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-xl mx-auto px-4 pt-6" id="main-content">
        <div id="tab-all" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-medium flex items-center gap-2">
                    <span>全部記錄</span>
                    <span id="all-count" class="text-xs bg-stone-200 text-stone-600 px-2.5 py-1 rounded-full font-mono">0</span>
                </h2>
                <div onclick="showAddModal()" 
                     class="flex items-center gap-2 bg-amber-600 hover:bg-amber-700 text-white text-sm font-medium px-5 py-2.5 rounded-3xl shadow-sm active:scale-95 transition-all cursor-pointer">
                    <i class="fa-solid fa-plus"></i>
                    <span>新增記錄</span>
                </div>
            </div>
            <div id="all-grid" class="grid grid-cols-2 gap-4"></div>
        </div>

        <div id="tab-paid" class="tab-content hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-medium flex items-center gap-2">
                    <span class="text-emerald-600">💸</span>
                    <span>已付款</span>
                </h2>
                <span id="paid-count" class="text-xs bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full">0 件</span>
            </div>
            <div id="paid-grid" class="grid grid-cols-2 gap-4"></div>
        </div>

        <div id="tab-shipped" class="tab-content hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-medium flex items-center gap-2">
                    <span class="text-blue-600">📮</span>
                    <span>已到貨</span>
                </h2>
                <span id="shipped-count" class="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full">0 件</span>
            </div>
            <div id="shipped-grid" class="grid grid-cols-2 gap-4"></div>
        </div>

        <div id="tab-home" class="tab-content hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-medium flex items-center gap-2">
                    <span class="text-purple-600">🏠</span>
                    <span>已返屋企</span>
                </h2>
                <span id="home-count" class="text-xs bg-purple-100 text-purple-700 px-3 py-1 rounded-full">0 件</span>
            </div>
            <div id="home-grid" class="grid grid-cols-2 gap-4"></div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 z-50">
        <div class="max-w-xl mx-auto">
            <div class="grid grid-cols-4 text-xs">
                <button onclick="switchTab(0)" id="nav-0" class="flex flex-col items-center py-3 text-amber-600 border-t-2 border-amber-600">
                    <i class="fa-solid fa-list-ul text-xl mb-1"></i>
                    <span class="font-medium">全部</span>
                </button>
                <button onclick="switchTab(1)" id="nav-1" class="flex flex-col items-center py-3 text-stone-400 hover:text-stone-600">
                    <span class="text-2xl mb-1">💸</span>
                    <span class="font-medium">已付</span>
                </button>
                <button onclick="switchTab(2)" id="nav-2" class="flex flex-col items-center py-3 text-stone-400 hover:text-stone-600">
                    <span class="text-2xl mb-1">📮</span>
                    <span class="font-medium">到貨</span>
                </button>
                <button onclick="switchTab(3)" id="nav-3" class="flex flex-col items-center py-3 text-stone-400 hover:text-stone-600">
                    <span class="text-2xl mb-1">🏠</span>
                    <span class="font-medium">返屋企</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Add / Edit Modal -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/70 flex items-end z-[100]">
        <div class="modal bg-white w-full max-w-xl mx-auto rounded-t-3xl max-h-[92vh] overflow-hidden flex flex-col">
            <div class="px-6 py-5 border-b flex items-center justify-between">
                <h3 id="modal-title" class="font-semibold text-xl">新增記錄</h3>
                <button onclick="hideAddModal()" class="text-3xl leading-none text-stone-400 hover:text-stone-600">×</button>
            </div>
            
            <div class="flex-1 overflow-auto p-6 space-y-8">
                <!-- Photo -->
                <div>
                    <label class="block text-sm font-medium text-stone-500 mb-3">商品照片</label>
                    <div id="photo-upload-area" 
                         onclick="document.getElementById('photo-input').click()"
                         class="border-2 border-dashed border-stone-300 rounded-3xl h-64 flex flex-col items-center justify-center cursor-pointer hover:border-amber-300 transition-colors">
                        <i class="fa-solid fa-camera text-4xl text-stone-300 mb-3"></i>
                        <p class="text-stone-400 text-sm">點擊上傳或拍照</p>
                    </div>
                    
                    <input type="file" id="photo-input" accept="image/*" class="hidden" onchange="handlePhotoSelect(event)">
                    
                    <div id="photo-preview" class="hidden mt-4 relative">
                        <div class="relative">
                            <img id="preview-img" class="w-full rounded-3xl shadow-sm" alt="預覽">
                            <button onclick="triggerPhotoReupload()" 
                                    class="absolute bottom-4 left-4 bg-white shadow-md text-amber-600 w-9 h-9 rounded-2xl flex items-center justify-center border border-stone-200 hover:bg-amber-50">
                                <i class="fa-solid fa-pen text-lg"></i>
                            </button>
                            <button onclick="removePhoto()" 
                                    class="absolute top-4 right-4 bg-white text-red-500 w-8 h-8 rounded-2xl flex items-center justify-center shadow">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Notes -->
                <div>
                    <label class="block text-sm font-medium text-stone-500 mb-2">備註 / 商品名稱</label>
                    <textarea id="notes-input" rows="3"
                        class="w-full border border-stone-200 focus:border-amber-400 rounded-3xl px-5 py-4 text-base resize-none focus:outline-none"
                        placeholder="例如：無印良品 棉質 T 恤"></textarea>
                </div>
                
                <!-- Status -->
                <div>
                    <label class="block text-sm font-medium text-stone-500 mb-3">目前狀態</label>
                    <div class="grid grid-cols-3 gap-3" id="status-options"></div>
                </div>
            </div>
            
            <div class="p-6 border-t flex gap-4">
                <button onclick="hideAddModal()" class="flex-1 py-4 text-stone-500 font-medium border border-stone-200 rounded-3xl active:bg-stone-100">
                    取消
                </button>
                <button onclick="saveRecord()" class="flex-1 py-4 bg-amber-600 hover:bg-amber-700 text-white font-medium rounded-3xl active:scale-95 transition-all">
                    保存記錄
                </button>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black/70 flex items-end z-[100]">
        <div class="modal bg-white w-full max-w-xl mx-auto rounded-t-3xl overflow-hidden">
            <div class="p-6">
                <div class="flex justify-end mb-4">
                    <button onclick="hideDetailModal()" class="text-3xl text-stone-400 hover:text-stone-600">×</button>
                </div>
                
                <div id="detail-image-container" class="detail-image-container mb-6">
                    <img id="detail-img" alt="商品照片">
                    
                    <button onclick="prevRecord()" 
                            class="nav-arrow left-4 flex items-center justify-center text-2xl text-stone-700 rounded-2xl">
                        ←
                    </button>
                    <button onclick="nextRecord()" 
                            class="nav-arrow right-4 flex items-center justify-center text-2xl text-stone-700 rounded-2xl">
                        →
                    </button>
                </div>
                
                <div class="space-y-6">
                    <div>
                        <div class="text-xs text-stone-400 mb-1">備註</div>
                        <div id="detail-notes" class="text-lg leading-relaxed"></div>
                    </div>
                    
                    <div>
                        <div class="text-xs text-stone-400 mb-2">狀態</div>
                        <div id="detail-status" class="flex gap-3"></div>
                    </div>
                    
                    <div class="text-xs text-stone-400">
                        記錄時間: <span id="detail-time"></span>
                    </div>
                </div>
            </div>
            
            <div class="border-t p-6 flex gap-3">
                <button onclick="editCurrentRecord()" 
                        class="flex-1 py-4 border border-stone-300 rounded-3xl text-stone-700 font-medium flex items-center justify-center gap-2 hover:bg-stone-50">
                    <i class="fa-solid fa-pen"></i>
                    <span>編輯</span>
                </button>
                <button onclick="deleteCurrentRecord()" 
                        class="flex-1 py-4 bg-red-50 text-red-600 rounded-3xl font-medium flex items-center justify-center gap-2 hover:bg-red-100">
                    <i class="fa-solid fa-trash"></i>
                    <span>刪除</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Backup Modal -->
    <div id="backup-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[200]">
        <div class="bg-white rounded-3xl max-w-sm w-full mx-4 overflow-hidden">
            <div class="p-8">
                <h3 class="text-2xl font-semibold mb-2">備份與還原</h3>
                <p class="text-stone-500 text-sm leading-relaxed">
                    建議定期備份您的資料。<br>
                    換手機時只需匯入 JSON 檔案即可恢復所有記錄。
                </p>
                <div class="my-8 space-y-4">
                    <button onclick="exportData()" class="w-full py-4 bg-white border-2 border-stone-300 hover:border-stone-400 rounded-3xl flex items-center justify-center gap-3 text-base font-medium">
                        <i class="fa-solid fa-download"></i>
                        <span>下載備份 JSON</span>
                    </button>
                    <button onclick="document.getElementById('import-input-backup').click()" class="w-full py-4 bg-amber-600 text-white rounded-3xl flex items-center justify-center gap-3 text-base font-medium">
                        <i class="fa-solid fa-upload"></i>
                        <span>匯入備份</span>
                    </button>
                    <input type="file" id="import-input-backup" accept=".json" class="hidden" onchange="importData(event)">
                </div>
            </div>
            <div class="bg-stone-50 px-8 py-6 text-center border-t">
                <button onclick="hideBackupModal()" class="text-stone-400 hover:text-stone-600 font-medium">關閉</button>
            </div>
        </div>
    </div>

    <script>
        let records = [];
        let currentEditId = null;
        let currentDetailId = null;
        let currentPhotoBase64 = null;
        let currentTab = 0;
        let currentSortOrder = 'date-desc';
        let detailRecordIds = [];
        
        const STATUS_OPTIONS = [
            { key: 'paid', emoji: '💸', label: '已付款', color: 'emerald' },
            { key: 'shipped', emoji: '📮', label: '已到貨', color: 'blue' },
            { key: 'home', emoji: '🏠', label: '返咗屋企', color: 'purple' }
        ];
        
        function loadRecords() {
            const saved = localStorage.getItem('purchaseRecords');
            records = saved ? JSON.parse(saved) : [];
            renderAll();
        }
        
        function saveToStorage() {
            localStorage.setItem('purchaseRecords', JSON.stringify(records));
        }
        
        function sortRecords(recs) {
            const sorted = [...recs];
            if (currentSortOrder === 'date-desc') sorted.sort((a, b) => b.timestamp - a.timestamp);
            else if (currentSortOrder === 'date-asc') sorted.sort((a, b) => a.timestamp - b.timestamp);
            else if (currentSortOrder === 'notes-asc') sorted.sort((a, b) => (a.notes || '').localeCompare(b.notes || '', 'zh-HK'));
            return sorted;
        }
        
        function renderGrid(containerId, filteredRecords) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            const sorted = sortRecords(filteredRecords);
            
            if (sorted.length === 0) {
                container.innerHTML = `<div class="col-span-2 py-12 text-center"><div class="mx-auto w-16 h-16 bg-stone-100 rounded-3xl flex items-center justify-center text-4xl mb-4">📦</div><p class="text-stone-400">暫無記錄</p></div>`;
                return;
            }
            
            sorted.forEach(record => {
                const div = document.createElement('div');
                div.className = `card bg-white rounded-3xl overflow-hidden shadow-sm cursor-pointer`;
                div.innerHTML = `
                    <div class="photo-container">
                        <img src="${record.image}" class="w-full h-full object-cover thumbnail" alt="">
                    </div>
                    <div class="p-4">
                        <div class="flex justify-between items-start gap-2">
                            <div class="text-sm line-clamp-2 font-medium flex-1">${record.notes || '無備註'}</div>
                            <div onclick="event.stopImmediatePropagation(); changeStatus('${record.id}');" class="status-badge bg-${getStatusColor(record.status)}-100 text-${getStatusColor(record.status)}-700 whitespace-nowrap">
                                ${getStatusEmoji(record.status)}
                            </div>
                        </div>
                        <div class="text-[10px] text-stone-400 mt-3">${new Date(record.timestamp).toLocaleDateString('zh-HK')}</div>
                    </div>
                `;
                div.onclick = () => showDetail(record.id);
                container.appendChild(div);
            });
        }
        
        function getStatusEmoji(status) {
            const found = STATUS_OPTIONS.find(s => s.key === status);
            return found ? found.emoji : '📦';
        }
        
        function getStatusColor(status) {
            const found = STATUS_OPTIONS.find(s => s.key === status);
            return found ? found.color : 'stone';
        }
        
        function renderAll() {
            renderGrid('all-grid', records);
            document.getElementById('all-count').textContent = records.length;
            
            const paid = records.filter(r => r.status === 'paid');
            renderGrid('paid-grid', paid);
            document.getElementById('paid-count').textContent = `${paid.length} 件`;
            
            const shipped = records.filter(r => r.status === 'shipped');
            renderGrid('shipped-grid', shipped);
            document.getElementById('shipped-count').textContent = `${shipped.length} 件`;
            
            const home = records.filter(r => r.status === 'home');
            renderGrid('home-grid', home);
            document.getElementById('home-count').textContent = `${home.length} 件`;
        }
        
        function changeSortOrder() {
            currentSortOrder = document.getElementById('sort-select').value;
            renderAll();
        }
        
        function switchTab(tabIndex) {
            currentTab = tabIndex;
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
            const tabIds = ['tab-all', 'tab-paid', 'tab-shipped', 'tab-home'];
            document.getElementById(tabIds[tabIndex]).classList.remove('hidden');
            
            for (let i = 0; i < 4; i++) {
                const navBtn = document.getElementById(`nav-${i}`);
                if (i === tabIndex) {
                    navBtn.classList.add('text-amber-600', 'border-t-2', 'border-amber-600');
                    navBtn.classList.remove('text-stone-400');
                } else {
                    navBtn.classList.remove('text-amber-600', 'border-t-2', 'border-amber-600');
                    navBtn.classList.add('text-stone-400');
                }
            }
        }
        
        function handlePhotoSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                compressImage(ev.target.result, (compressed) => {
                    currentPhotoBase64 = compressed;
                    showPhotoPreview(compressed);
                });
            };
            reader.readAsDataURL(file);
        }
        
        function showPhotoPreview(src) {
            const preview = document.getElementById('photo-preview');
            const uploadArea = document.getElementById('photo-upload-area');
            preview.classList.remove('hidden');
            uploadArea.classList.add('hidden');
            document.getElementById('preview-img').src = src;
        }
        
        function compressImage(base64, callback) {
            const img = new Image();
            img.onload = function() {
                let width = img.width, height = img.height;
                const MAX_DIM = 900;
                if (width > MAX_DIM || height > MAX_DIM) {
                    if (width > height) { height = Math.round(height * MAX_DIM / width); width = MAX_DIM; }
                    else { width = Math.round(width * MAX_DIM / height); height = MAX_DIM; }
                }
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.82));
            };
            img.src = base64;
        }
        
        function triggerPhotoReupload() {
            document.getElementById('photo-input').click();
        }
        
        function removePhoto() {
            currentPhotoBase64 = null;
            document.getElementById('photo-preview').classList.add('hidden');
            document.getElementById('photo-upload-area').classList.remove('hidden');
        }
        
        function renderStatusOptions(selectedStatus = 'paid') {
            const container = document.getElementById('status-options');
            container.innerHTML = '';
            STATUS_OPTIONS.forEach(status => {
                const isSelected = status.key === selectedStatus;
                const btn = document.createElement('button');
                btn.className = `flex flex-col items-center py-4 rounded-3xl border transition-all ${isSelected ? `border-${status.color}-400 bg-${status.color}-50` : 'border-transparent hover:bg-stone-100'}`;
                btn.innerHTML = `<span class="text-4xl mb-2">${status.emoji}</span><span class="text-xs font-medium">${status.label}</span>`;
                btn.onclick = () => { currentStatus = status.key; renderStatusOptions(currentStatus); };
                container.appendChild(btn);
            });
        }
        
        let currentStatus = 'paid';
        
        function showAddModal(editRecord = null) {
            currentEditId = editRecord ? editRecord.id : null;
            currentPhotoBase64 = editRecord ? editRecord.image : null;
            
            document.getElementById('modal-title').textContent = editRecord ? '編輯記錄' : '新增記錄';
            document.getElementById('notes-input').value = editRecord ? (editRecord.notes || '') : '';
            
            const preview = document.getElementById('photo-preview');
            const uploadArea = document.getElementById('photo-upload-area');
            
            if (editRecord && editRecord.image) {
                preview.classList.remove('hidden');
                uploadArea.classList.add('hidden');
                document.getElementById('preview-img').src = editRecord.image;
            } else {
                preview.classList.add('hidden');
                uploadArea.classList.remove('hidden');
            }
            
            currentStatus = editRecord ? editRecord.status : 'paid';
            renderStatusOptions(currentStatus);
            
            const modal = document.getElementById('add-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }
        
        function hideAddModal() {
            const modal = document.getElementById('add-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            currentPhotoBase64 = null;
            currentEditId = null;
        }
        
        function saveRecord() {
            const notes = document.getElementById('notes-input').value.trim();
            if (!currentPhotoBase64 && !currentEditId) {
                alert('請上傳一張照片！');
                return;
            }
            
            if (currentEditId) {
                const record = records.find(r => r.id === currentEditId);
                if (record) {
                    record.notes = notes || '無備註';
                    if (currentPhotoBase64) record.image = currentPhotoBase64;
                    record.status = currentStatus;
                }
            } else {
                const newRecord = {
                    id: 'rec_' + Date.now().toString(36) + Math.random().toString(36).substr(2),
                    image: currentPhotoBase64,
                    notes: notes || '無備註',
                    status: currentStatus,
                    timestamp: Date.now()
                };
                records.unshift(newRecord);
            }
            
            saveToStorage();
            hideAddModal();
            renderAll();
        }
        
        function showDetail(id) {
            const allSorted = sortRecords(records);
            detailRecordIds = allSorted.map(r => r.id);
            currentDetailId = id;
            renderCurrentDetail();
        }
        
        function renderCurrentDetail() {
            const record = records.find(r => r.id === currentDetailId);
            if (!record) return;
            
            document.getElementById('detail-img').src = record.image;
            document.getElementById('detail-notes').textContent = record.notes || '無備註';
            document.getElementById('detail-time').textContent = new Date(record.timestamp).toLocaleString('zh-HK');
            
            const statusContainer = document.getElementById('detail-status');
            statusContainer.innerHTML = `
                <div onclick="changeStatusFromDetail()" class="cursor-pointer status-badge bg-${getStatusColor(record.status)}-100 text-${getStatusColor(record.status)}-700 px-6 py-2 text-base flex items-center gap-2">
                    ${getStatusEmoji(record.status)} ${STATUS_OPTIONS.find(s => s.key === record.status).label}
                </div>
            `;
            
            const modal = document.getElementById('detail-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }
        
        function prevRecord() {
            const index = detailRecordIds.indexOf(currentDetailId);
            if (index > 0) {
                currentDetailId = detailRecordIds[index - 1];
                renderCurrentDetail();
            }
        }
        
        function nextRecord() {
            const index = detailRecordIds.indexOf(currentDetailId);
            if (index < detailRecordIds.length - 1) {
                currentDetailId = detailRecordIds[index + 1];
                renderCurrentDetail();
            }
        }
        
        function hideDetailModal() {
            const modal = document.getElementById('detail-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            currentDetailId = null;
        }
        
        function editCurrentRecord() {
            const record = records.find(r => r.id === currentDetailId);
            if (record) {
                hideDetailModal();
                setTimeout(() => {
                    showAddModal(record);
                }, 300);
            }
        }
        
        function deleteCurrentRecord() {
            if (!confirm('確定刪除這筆記錄嗎？')) return;
            records = records.filter(r => r.id !== currentDetailId);
            saveToStorage();
            hideDetailModal();
            renderAll();
        }
        
        function changeStatus(id) {
            const record = records.find(r => r.id === id);
            if (!record) return;
            const idx = STATUS_OPTIONS.findIndex(s => s.key === record.status);
            record.status = STATUS_OPTIONS[(idx + 1) % STATUS_OPTIONS.length].key;
            saveToStorage();
            renderAll();
        }
        
        function changeStatusFromDetail() {
            if (!currentDetailId) return;
            changeStatus(currentDetailId);
            renderCurrentDetail();
        }
        
        function showBackupModal() {
            document.getElementById('backup-modal').classList.remove('hidden');
        }
        
        function hideBackupModal() {
            document.getElementById('backup-modal').classList.add('hidden');
        }
        
        function exportData() {
            if (records.length === 0) return alert('目前沒有資料可以備份');
            const dataStr = JSON.stringify(records, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            const link = document.createElement('a');
            link.href = dataUri;
            link.download = `purchase_backup_${new Date().toISOString().slice(0,10)}.json`;
            link.click();
            hideBackupModal();
        }
        
        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (!Array.isArray(imported)) throw new Error();
                    if (confirm(`即將匯入 ${imported.length} 筆記錄。\n現有資料將被替換，確定繼續？`)) {
                        records = imported;
                        saveToStorage();
                        renderAll();
                        hideBackupModal();
                        alert('✅ 資料已成功匯入！');
                    }
                } catch(err) {
                    alert('讀取失敗，請確認檔案是否正確。');
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        }
        
        function initializeApp() {
            loadRecords();
            switchTab(0);
            
            // Modal background close
            const addModal = document.getElementById('add-modal');
            const detailModal = document.getElementById('detail-modal');
            
            addModal.addEventListener('click', (e) => {
                if (e.target === addModal) hideAddModal();
            });
            
            detailModal.addEventListener('click', (e) => {
                if (e.target === detailModal) hideDetailModal();
            });
            
            console.log('%c✅ 早買早享受 App 已更新', 'color:#ca8a04; font-family:monospace');
        }
        
        window.onload = initializeApp;
    </script>
</body>
</html>
